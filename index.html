<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #333;
}

/* NAVBAR */
nav {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    color: white;
    padding: 15px 20px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
}

/* CONTAINER */
.container {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 500;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    background: rgba(255,255,255,0.25);
}

/* SECTION */
.section {
    animation: fade 0.5s ease;
}

/* QUESTIONS */
.question-box {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-top: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.question-box p {
    font-weight: 600;
}

/* OPTIONS */
.option {
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    background: #f1f1f1;
}

.correct {
    background: #2ecc71 !important;
    color: white;
}

.wrong {
    background: #e74c3c !important;
    color: white;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #000;
}

/* ANIMATION */
@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* MOBILE OPTIMIZATION */
@media(max-width: 600px) {
    nav {
        font-size: 16px;
    }

    .card {
        padding: 20px;
        font-size: 14px;
    }

    .question-box {
        padding: 15px;
    }
}
</style>
</head>

function openSection(section) {
    document.getElementById("home").style.display = "none";
    const sec = document.getElementById("section");

    let html = `<button class="btn" onclick="goBack()">⬅ Back</button>`;
    html += `<h2 style="margin-top:10px;">${section.toUpperCase()}</h2>`;

    data[section].forEach((q, i) => {
        html += `<div class="question-box">
                    <p>${i+1}. ${q.q}</p>`;

        q.options.forEach((opt, index) => {
            html += `<div class="option" onclick="check(this,'${section}',${i},${index})">${opt}</div>`;
        });

        html += `<div id="res-${i}"></div></div>`;
    });

    sec.innerHTML = html;
}

function check(el, section, qIndex, selected) {
    const correct = data[section][qIndex].answer;
    const options = el.parentElement.querySelectorAll(".option");
    const res = document.getElementById(`res-${qIndex}`);

    options.forEach(o => o.style.pointerEvents = "none");

    if (selected === correct) {
        el.classList.add("correct");
        res.innerHTML = "✅ Correct";
    } else {
        el.classList.add("wrong");
        options[correct].classList.add("correct");
        res.innerHTML = "❌ Wrong";
    }
}

function goBack() {
    document.getElementById("home").style.display = "block";
    document.getElementById("section").innerHTML = "";
}
